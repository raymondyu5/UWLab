seed: 42

n_timesteps: !!float 4e8
policy: 'MlpPolicy'
n_steps: 200
batch_size: 4096
gae_lambda: 0.95
gamma: 0.99
n_epochs: 8
ent_coef: 0.0
learning_rate: !!float 3e-4
clip_range: !!float 0.2
target_kl: 6.0
vf_coef: 1.0
max_grad_norm: 1.0
policy_kwargs:
  activation_fn: 'nn.ELU'
  net_arch:
    pi: [256, 128, 64]
    vf: [256, 128, 64]
  squash_output: False
device: "cuda:0"
