seed: 42

n_timesteps: !!float 4e8
policy: 'MlpPolicy'
n_steps: 128
batch_size: 32768
gae_lambda: 0.95
gamma: 0.99
n_epochs: 5
ent_coef: 0.006
learning_rate: !!float 3e-4
clip_range: !!float 0.2
policy_kwargs:
  activation_fn: 'nn.ELU'
  net_arch: [512, 256, 128]
  squash_output: False
vf_coef: 1.0
max_grad_norm: 1.0
device: "cuda:0"
