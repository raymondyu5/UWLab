# FPO v10: v9 + tighter target_kl + lower actor_lr.
# target_kl=0.1 cuts off updates mid-epoch when policy moves too far (late-stage instability fix).
# actor_lr=1e-5 smaller gradient steps to prevent large updates at high SR.
# Everything else identical to v9.

fpo:
  num_warmup_steps: 5
  critic_warmup_iters: 10
  n_cfm_samples: 1

ppo:
  n_steps: 200
  batch_size: 4096
  n_epochs: 1
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.01
  learning_rate: 0.00001
  actor_lr: 0.00001
  critic_lr: 0.001
  vf_coef: 0.25
  ent_coef: 0.0
  target_kl: 0.1
  max_grad_norm: 1.0
  net_arch:
    pi: [256, 128, 64]
    vf: [256, 128, 64]
  activation_fn: elu

eval:
  interval: 50
  spawn: "random_1_trial"
  record_video: true
