# DSRL config for JointRel h16 policy.
# Noise-space RL only — no residual on top of the base diffusion action.
# Action space: 23D [7D delta arm | 16D abs hand], horizon=16.
# PPO noise space: 23 * 16 = 368 dims.

ppo:
  n_steps: 200
  batch_size: 4096
  n_epochs: 8
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  learning_rate: 0.0003
  vf_coef: 0.0001
  ent_coef: 0.0
  target_kl: 6.0
  max_grad_norm: 1.0
  net_arch:
    pi: [256, 128, 64]
    vf: [256, 128, 64]
  activation_fn: elu

rfs:
  noise_dims: "0:23"
  residual_dims: ""        # DSRL: no residual

  residual_step: 1

  residual_scale: 0.1      # unused when residual_dims is empty

  # BoundedRelativeJointPositionAction clamps joint positions to arm limits.
  clip_actions: false

  finger_smooth_alpha: 1.0

  num_warmup_steps: 5

eval:
  interval: 50
  spawn: "bottle_pour_narrow"
  record_video: true
  record_plots: true

# isaacpy scripts/reinforcement_learning/sb3/rfs/train.py --task UW-FrankaLeap-PourBottle-JointAbs-v0 --num_envs 1024 --diffusion_path logs/bc_cfm_pcd_bourbon_0324_absjoint_h16_hist4_extnoise --cfg configs/rl/arm_rfs_joint_cfg.yaml --eval_spawn random --wandb_project rfs_uwlab --asymmetric_ac --enable_cameras --headless