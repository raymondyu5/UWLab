# RFS config for JointRel h16 policy.
# Action space: 23D [7D delta arm | 16D abs hand].
# horizon=16 → noise space = 23 * 16 = 368 dims.

ppo:
  n_steps: 200
  batch_size: 4096
  n_epochs: 8
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  learning_rate: 0.0003
  vf_coef: 0.0001
  ent_coef: 0.0
  target_kl: 6.0
  max_grad_norm: 1.0
  net_arch:
    pi: [256, 128, 64]
    vf: [256, 128, 64]
  activation_fn: elu

rfs:
  # JointRel action: [0:7] delta arm, [7:23] abs hand
  noise_dims: "0:23"
  residual_dims: "7:23"   # hand dims only get residual

  residual_step: 1

  residual_scale: 0.1

  # BoundedRelativeJointPositionAction already clamps resulting joint positions
  # to arm limits, so IkRel-style clipping of the first 6 dims is not needed.
  clip_actions: false

  finger_smooth_alpha: 1.0

  num_warmup_steps: 5

eval:
  interval: 50
  spawn: "random_1_trial"
  record_video: true
  record_plots: false
