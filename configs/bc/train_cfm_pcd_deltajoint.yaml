horizon: 4
n_obs_steps: 1
n_action_steps: 8

dataset:
  data_path: ???        # required: path to directory containing episode_*.zarr
  load_list: [all]
  obs_keys: [arm_joint_pos, hand_joint_pos]
  action_key: [arm_joint_pos_target, hand_action]
  action_base_keys: [arm_joint_pos, null]
  image_keys: [seg_pc]
  # pad_before is derived automatically as n_obs_steps-1 inside ZarrDataset
  pad_after: 3          # = horizon - 1; allows last episode steps to be starting points
  val_ratio: 0.05
  downsample_points: 2048
  pcd_noise: 0.02
  noise_extrinsic: false
  noise_extrinsic_parameter: [0.05, 0.2]
  hand_dropout_prob: 0.0
  chunk_relative: false
  obs_noise:
    arm_joint_pos: 0.05
    hand_joint_pos: 0.05
  # cotraining (optional)
  real_data_path: null  # set to enable cotraining with real data
  sim_ratio: 0.95

ema:
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

pointnet:
  in_channels: 3
  local_channels: [64, 64, 64, 128, 1024]
  global_channels: [512, 256]
  use_bn: false

policy:
  use_action_history: false  # set true when n_obs_steps > 1 to condition on past actions
  sigma: 0.0
  num_inference_steps: 5
  diffusion_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

dataloader:
  batch_size: 256
  num_workers: 8
  pin_memory: true
  persistent_workers: false

training:
  device: cuda:0
  seed: 42
  lr: 1.0e-4
  betas: [0.95, 0.999]
  weight_decay: 1.0e-6
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 1000
  val_every: 10
  checkpoint_every: 100
  checkpoint_dir: ${hydra:run.dir}/checkpoints
  resume: false
  use_wandb: false
  wandb_project: uwlab_bc
  wandb_run_name: null

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
