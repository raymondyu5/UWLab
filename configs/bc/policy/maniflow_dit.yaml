# @package _global_
# ManiFlow DP3Encoder + DiTX (flow + consistency). See third_party/ManiFlow_Policy.
# `shape_meta` is merged in train_cfm_pcd_maniflow.py (no Hydra _target_; avoids import-path issues).

policy:
  pcd_key: seg_pc
  # One PointNet forward on current PCD; proprio (and optional past_actions) flattened into one state MLP vector.
  single_frame_point_cloud: true
  # When true with n_obs_steps > 1, append flattened past_actions to that vector (shape_meta set in train script).
  fuse_past_actions_in_state: false

  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}

  block_type: "DiTX"
  n_layer: 12
  n_head: 8
  n_emb: 768
  visual_cond_len: ${dataset.downsample_points}
  qkv_bias: true
  qk_norm: true

  language_conditioned: false
  pre_norm_modality: false

  flow_batch_ratio: 0.75
  consistency_batch_ratio: 0.25

  sample_t_mode_flow: "beta"
  sample_t_mode_consistency: "discrete"
  sample_dt_mode_consistency: "uniform"
  sample_target_t_mode: "relative"
  denoise_timesteps: 10

  diffusion_timestep_embed_dim: 128
  diffusion_target_t_embed_dim: 128

  encoder_type: "DP3Encoder"
  encoder_output_dim: 128
  crop_shape: null
  use_pc_color: false
  pointnet_type: "pointnet"
  downsample_points: true

  num_inference_steps: 10
  obs_as_global_cond: true

  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: 128
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false
    num_points: ${dataset.downsample_points}
    pointwise: true
    state_mlp_size: [64, 64]
